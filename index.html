<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<h1 style="text-align:center; text-decoration:underline;">My Family Tree</h1>
<h4 style="text-align:center;">Six Generations of Mothers</h4>
<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  font-family: "Georgia", serif;
  overflow: hidden;
  color: gold;
}

#viewport {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  cursor: grab;
  position: relative;
}

#tree {
  position: absolute;
  transform-origin: 0 0;
}

/* Tree layout */
ul {
  padding-top: 50px;
  position: relative;
  display: flex;
  justify-content: center;
}

li {
  list-style: none;
  text-align: center;
  position: relative;
  padding: 20px 30px;
}

/* Gold connectors */
/* ========================= */
/* GOLD BLOODLINE CONNECTORS */
/* ========================= */

ul ul::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  height: 50px;
  border-left: 3px solid gold;
}

/* Horizontal sibling connectors (gold) */
li::before, li::after {
  content: '';
  position: absolute;
  top: 0;
  width: 50%;
  height: 30px;
  border-top: 3px solid gold;
}

li::before { right: 50%; }
li::after {
  left: 50%;
  border-left: 3px solid gold;
}

li:only-child::before,
li:only-child::after {
  display: none;
}

/* ========================= */
/* SILVER MARRIAGE CONNECTOR */
/* ========================= */

.couple {
  display: flex;
  gap: 25px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 60px;
  height: 3px;
  background: silver;
  box-shadow: 0 0 8px silver;
}

/* ========================= */
/* PERSON STYLES */
/* ========================= */

.bloodline {
  border: 3px solid gold;
  box-shadow: 0 0 25px gold;
}

.married-in {
  border: 2px solid silver;
  box-shadow: 0 0 10px rgba(200,200,200,0.6);
  opacity: 0.9;
}

.mother h3 {
  color: gold;
}

/* Make hover popup appear above everything */
.person {
  position: relative;
  z-index: 2;
}

.person:hover {
  z-index: 999;
}

.popup {
  z-index: 1000;
}

/* Person Card */
.person {
  background: linear-gradient(145deg, #2c2c2c, #111);
  border: 2px solid gold;
  border-radius: 15px;
  padding: 15px;
  width: 150px;
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
  position: relative;
  transition: 0.3s;
}

.bloodline {
  box-shadow: 0 0 25px gold;
  border: 3px solid gold;
}

.married-in {
  opacity: 0.85;
  border: 2px solid #aa8800;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

/* Marriage connector */
.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 40px;
  height: 2px;
  background: gold;
}

.person {
  position: relative;
  z-index: 2;
}

.person:hover {
  z-index: 999; /* bring hovered card above everything */
}

.popup {
  position: absolute;
  bottom: -120px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  border: 1px solid gold;
  padding: 10px;
  font-size: 12px;
  width: 170px;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
  z-index: 1000; /* ensure popup always on top */
}

.person:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px gold;
}

.person img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid gold;
}

.person h3 {
  margin: 10px 0 0;
  font-size: 15px;
}


/* Hover popup */
.popup {
  position: absolute;
  bottom: -110px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  border: 1px solid gold;
  padding: 8px;
  font-size: 12px;
  width: 160px;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
}

.person:hover .popup {
  opacity: 1;
}

/* Couple container */
.couple {
  display: flex;
  gap: 15px;
  justify-content: center;
}

/* Zoom Controls */
#zoom-controls {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
  z-index: 10000;
}

.zoom-btn {
  background: linear-gradient(145deg, #2c2c2c, #111);
  border: 2px solid gold;
  color: gold;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

.zoom-btn:hover {
  background: linear-gradient(145deg, #3c3c3c, #222);
  box-shadow: 0 0 15px gold;
  transform: scale(1.05);
}

.zoom-btn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">−</button>
  <button class="zoom-btn" id="zoom-reset">Reset</button>
</div>

<div id="viewport">
  <div id="tree"></div>
</div>

<script src="familyData.js"></script>

<script>
function createPerson(person, isMother=false, isBloodline=true) {
  const div = document.createElement("div");

  div.className = "person";

  if (isMother) div.classList.add("mother");
  if (isBloodline) div.classList.add("bloodline");
  else div.classList.add("married-in");

  let icon = "";
  if (!isBloodline) icon = " 💍";   // ring for married in
  if (isMother) icon += " 👑";      // crown for mother line

  div.innerHTML = `
    <img src="${person.image}">
    <h3>${person.name}${icon}</h3>
    <div class="popup">${person.info}<br>Click for full story</div>
  `;

  div.onclick = () => {
window.location.href = "People/" + person.name.replace(/\s/g,'') + ".html";
  };

  return div;
}

function buildTree(person) {
  const li = document.createElement("li");

  const coupleDiv = document.createElement("div");
  coupleDiv.className = "couple";

  const mother = person.gender === "female";

  coupleDiv.appendChild(createPerson(person, mother, true)); // bloodline
  if (person.spouse) {
coupleDiv.appendChild(createPerson(person.spouse, person.spouse.gender === "female", false)); // married in
  }

  li.appendChild(coupleDiv);

  if (person.children && person.children.length > 0) {
    const ul = document.createElement("ul");
    person.children.forEach(child => {
      ul.appendChild(buildTree(child));
    });
    li.appendChild(ul);
  }

  return li;
}

const rootUl = document.createElement("ul");
rootUl.appendChild(buildTree(family));
document.getElementById("tree").appendChild(rootUl);

/* Zoom + Drag */
let scale = 1;
let isDragging = false;
let startX, startY;
let offsetX = 0, offsetY = 0;

const tree = document.getElementById("tree");
const viewport = document.getElementById("viewport");

viewport.addEventListener("wheel", e => {
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(.5, scale), 2);
  tree.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

viewport.addEventListener("mousedown", e => {
  isDragging = true;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
});

viewport.addEventListener("mouseup", () => isDragging = false);

viewport.addEventListener("mousemove", e => {
  if (!isDragging) return;
  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;
  tree.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

/* Zoom Button Controls */
document.getElementById("zoom-in").addEventListener("click", () => {
  scale = Math.min(scale + 0.2, 2);
  tree.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

document.getElementById("zoom-out").addEventListener("click", () => {
  scale = Math.max(scale - 0.2, 0.5);
  tree.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

document.getElementById("zoom-reset").addEventListener("click", () => {
  scale = 1;
  
  // Find Joan element
  const allPeople = tree.querySelectorAll(".person h3");
  let joanElement = null;
  for (let el of allPeople) {
    if (el.textContent.includes("Joan")) {
      joanElement = el.closest(".person");
      break;
    }
  }
  
  if (joanElement) {
    // Get Joan's position relative to the tree
    const joanRect = joanElement.getBoundingClientRect();
    const treeRect = tree.getBoundingClientRect();
    
    // Calculate center offset to put Joan in the middle of the viewport
    offsetX = (viewport.clientWidth / 2) - (joanRect.left - treeRect.left + joanRect.width / 2);
    offsetY = (viewport.clientHeight / 2) - (joanRect.top - treeRect.top + joanRect.height / 2);
  } else {
    offsetX = 0;
    offsetY = 0;
  }
  
  tree.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});


</script>

</body>
</html>
