<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mia</title>

<style>

body{
    margin:0;
    background: radial-gradient(circle at top,#1a1a1a,#000);
    font-family: Georgia, serif;
    color: gold;
    display:flex;
    justify-content:center;
}

.page{
    max-width:900px;
    padding:50px;
}

/* Header */

h1{
    font-size:48px;
    margin-bottom:10px;
}

/* Portrait */

.portrait{
    width:260px;
    border-radius:12px;
    border:3px solid gold;
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

/* Info panel */

.info-box{
    margin-top:25px;
    padding:20px;
    border:2px solid gold;
    border-radius:12px;
    background:#111;
}

.info-box h3{
    margin-top:0;
}

.info-row{
    margin:6px 0;
}

/* Description */

.bio{
    margin-top:30px;
    line-height:1.6;
    font-size:18px;
}

/* Back button */

.back{
    display:inline-block;
    margin-top:40px;
    padding:10px 18px;
    border:2px solid gold;
    border-radius:8px;
    text-decoration:none;
    color:gold;
    transition:.2s;
}

.back:hover{
    background:gold;
    color:black;
}

</style>
</head>

<body>

<div class="page">

<h1>Mia</h1>

<img src="images/mia.png" class="portrait">

<div class="info-box">

<h3>Basic Information</h3>
